<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== cart เท่านั้น ===== */

.cart-container{

padding:30px;
background:white;

}

.cart-title{

font-size:26px;
margin-bottom:20px;

}

.cart-table{

width:100%;
border-collapse: collapse;

}

.cart-table th,
.cart-table td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:center;

}

.cart-img{

width:70px;
height:70px;

object-fit:cover;

}

.qty-btn{

width:30px;
height:30px;
cursor:pointer;

}

.remove-btn{

background:red;
color:white;

border:none;
padding:6px 10px;
cursor:pointer;

}

.total-box{

margin-top:20px;
text-align:right;
font-size:22px;

}

.checkout-btn{

margin-top:15px;
padding:12px 20px;

background:orange;
color:white;

border:none;

font-size:18px;
cursor:pointer;

}

.back-btn{

margin-bottom:15px;

padding:8px 14px;

background:#eee;

border:1px solid #ccc;

cursor:pointer;

}

</style>

</head>

<body>

<div class="topbar">
From Gadgets to Enterprise - ร้านขายคอมครบวงจร
</div>

<div class="navbar">

<h2 class="logo">💻 COMSHOP</h2>

<input class="search" placeholder="ค้นหาสินค้า...">

<div>
<a href="index.html">🏠</a>
<a href="cart.html">🛒</a>
</div>

</div>

<div class="cart-container">

<button class="back-btn" onclick="goHome()">
← กลับหน้าหลัก
</button>

<h2 class="cart-title">
🛒 ตะกร้าสินค้า
</h2>

<table class="cart-table">

<thead>

<tr>

<th>สินค้า</th>
<th>ชื่อ</th>
<th>ราคา</th>
<th>จำนวน</th>
<th>รวม</th>
<th>ลบ</th>

</tr>

</thead>

<tbody id="cartBody">

</tbody>

</table>

<div class="total-box">

รวมทั้งหมด:
<span id="totalPrice">
0
</span>
บาท

<br>

<button class="checkout-btn"
onclick="goCheckout()">
ไปชำระเงิน
</button>

</div>

</div>


<script>

/* =====================
โหลด cart
===================== */

function loadCart(){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let body =
document.getElementById("cartBody");

body.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

let sum =
item.price * item.qty;

total += sum;

body.innerHTML += `

<tr>

<td>
<img src="${item.image}" class="cart-img">
</td>

<td>
${item.name}
</td>

<td>
${item.price.toLocaleString()}
</td>

<td>

<button class="qty-btn"
onclick="minusQty(${index})">
-
</button>

${item.qty}

<button class="qty-btn"
onclick="plusQty(${index})">
+
</button>

</td>

<td>
${sum.toLocaleString()}
</td>

<td>

<button class="remove-btn"
onclick="removeItem(${index})">
ลบ
</button>

</td>

</tr>

`;

});

document.getElementById("totalPrice").innerText =
total.toLocaleString();

}


/* เพิ่มจำนวน */

function plusQty(i){

let cart =
JSON.parse(localStorage.getItem("cart"));

cart[i].qty++;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

}


/* ลดจำนวน */

function minusQty(i){

let cart =
JSON.parse(localStorage.getItem("cart"));

if(cart[i].qty > 1){

cart[i].qty--;

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

}


/* ลบสินค้า */

function removeItem(i){

let cart =
JSON.parse(localStorage.getItem("cart"));

cart.splice(i,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

loadCart();

}


/* กลับหน้าแรก */

function goHome(){

window.location.href =
"index.html";

}


/* ไป checkout */

function goCheckout(){

let cart =
JSON.parse(
localStorage.getItem("cart")
);

if(!cart || cart.length === 0){

alert("ตะกร้ายังว่างอยู่");

return;

}

window.location.href =
"checkout.html";

}


/* โหลด */

loadCart();

</script>
<script>

/* โหลดสถานะ login */

function checkLogin(){

let isLogin =
localStorage.getItem("isLogin");

let username =
localStorage.getItem("loginUser");


if(isLogin === "true"){

document.getElementById("loginLink").style.display = "none";

document.getElementById("userName").innerText =
"👋 " + username;

document.getElementById("logoutBtn").style.display =
"inline-block";

}
else{

document.getElementById("logoutBtn").style.display =
"none";

}

}


/* logout */

function logout(){

localStorage.removeItem("isLogin");
localStorage.removeItem("loginUser");

alert("ออกจากระบบแล้ว");

window.location.href =
"index.html";

}


/* เรียก */

checkLogin();

</script>

</body>
</html>
