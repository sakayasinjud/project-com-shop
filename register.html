<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;
font-family: Arial;

background:linear-gradient(
135deg,
#0f172a,
#1e293b
);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.register-box{

width:380px;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

.logo{

text-align:center;
font-size:28px;
margin-bottom:10px;

}

.input-box{

margin-bottom:15px;

}

.input-box input{

width:100%;
padding:12px;

border:1px solid #ccc;
border-radius:8px;

}

.register-btn{

width:100%;
padding:12px;

background:orange;
color:white;

border:none;
border-radius:8px;

font-size:16px;
cursor:pointer;

}

.register-btn:hover{

background:#ff8c00;

}

.login-link{

text-align:center;
margin-top:15px;

}

.login-link a{

color:orange;
text-decoration:none;

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">
💻 COMSHOP สมัครสมาชิก
</div>

<form onsubmit="registerUser(event)">

<div class="input-box">

<input 
type="text"
id="regUser"
placeholder="ชื่อผู้ใช้"
required>

</div>

<div class="input-box">

<input 
type="password"
id="regPass"
placeholder="รหัสผ่าน"
required>

</div>

<button class="register-btn">
สมัครสมาชิก
</button>

</form>

<div class="login-link">

มีบัญชีแล้ว ?
<a href="login.html">
เข้าสู่ระบบ
</a>

</div>

</div>


<script>

function registerUser(event){

event.preventDefault();

let user =
document.getElementById("regUser").value;

let pass =
document.getElementById("regPass").value;


/* บันทึก user */

localStorage.setItem(
"user",
JSON.stringify({
username:user,
password:pass
})
);

alert("สมัครสมาชิกสำเร็จ 🎉");

window.location.href =
"login.html";

}

</script>

</body>
</html>
