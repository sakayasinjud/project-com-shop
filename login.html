<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== login เท่านั้น ===== */

body{

margin:0;
font-family: Arial, sans-serif;

background:linear-gradient(
135deg,
#0f172a,
#1e293b
);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* กล่อง login */

.login-box{

width:360px;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* logo */

.login-logo{

text-align:center;

font-size:28px;

margin-bottom:10px;

}

/* subtitle */

.login-sub{

text-align:center;

color:#666;

margin-bottom:25px;

}

/* input */

.input-box{

margin-bottom:15px;

}

.input-box input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:14px;

}

/* button */

.login-btn{

width:100%;

padding:12px;

background:orange;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

margin-top:10px;

}

.login-btn:hover{

background:#ff8c00;

}

/* register link */

.register-link{

text-align:center;

margin-top:15px;

font-size:14px;

}

.register-link a{

color:orange;

text-decoration:none;

}

.register-link a:hover{

text-decoration:underline;

}

</style>

</head>

<body>


<div class="login-box">

<div class="login-logo">
💻 COMSHOP
</div>

<div class="login-sub">
เข้าสู่ระบบร้านค้า
</div>


<form onsubmit="loginUser(event)">

<div class="input-box">

<input 
type="text"
id="username"
placeholder="ชื่อผู้ใช้"
required>

</div>


<div class="input-box">

<input 
type="password"
id="password"
placeholder="รหัสผ่าน"
required>

</div>


<button class="login-btn">
เข้าสู่ระบบ
</button>

</form>


<div class="register-link">

ยังไม่มีบัญชี ?
<a href="register.html">
สมัครสมาชิก
</a>

</div>


</div>


<script>

function loginUser(event){

event.preventDefault();

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;


/* โหลด user */

let savedUser =
JSON.parse(
localStorage.getItem("user")
);


/* ถ้ายังไม่มี user */

if(!savedUser){

alert("ยังไม่มีบัญชี กรุณาสมัครสมาชิกก่อน");

window.location.href =
"register.html";

return;

}


/* ตรวจ login */

if(
user === savedUser.username &&
pass === savedUser.password
){

/* จำสถานะ login */

localStorage.setItem(
"isLogin",
"true"
);

localStorage.setItem(
"loginUser",
savedUser.username
);

alert("เข้าสู่ระบบสำเร็จ 🎉");

window.location.href =
"index.html";

}
else{

alert("ชื่อผู้ใช้หรือรหัสผ่านผิด");

}

}

</script>


</body>
</html>
